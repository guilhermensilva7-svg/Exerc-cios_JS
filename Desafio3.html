<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio - 3</title>
</head>
<body>
   <script>
    var nome = prompt('Qual seu nome?')
    var classe = prompt('Qual sua classe? (1/2/3)');
    var vendas = Number(prompt('digite o total numero de vendas mensal'));

    if(classe == '1'){
    
        var total = 1500 + (0.025 * vendas);
        document.write('Você irá receber neste mês: ' + total + 'Reais');

    }else if(classe == '2'){
        
        var total = 2000 + (0.030 * vendas);
        document.write('Você irá receber neste mês: ' + total + 'Reais');

    }else if(classe == '3'){
        var total = 2500 + (0.035 * vendas);
        document.write('Você irá receber neste mês: ' + total + 'Reais');
        
    }
    else{
        document.write('Erro no sistema');
    }



   </script> 
</body>
</html>
