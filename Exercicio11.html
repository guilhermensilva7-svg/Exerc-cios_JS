<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 11 - JS</title>
</head>
<body>
    <script>
        var numA = Number(prompt('Digite a nota de sua primeira etapa'));
        var numB = Number(prompt('Digite a nota de sua segunda etapa'));
        var numC = Number(prompt('Digite a nota de sua terceira etapa'));
        var media = parseInt(numA + numB + numC)/3;
        document.write('Sua média é:  ' + media);
    </script>
</body>
</html>
