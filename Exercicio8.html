<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio - 8</title>
</head>
<body>
   <script>
    var temperatura = prompt('Qual a temperatura de hoje?');
    var chuva = prompt('Como está o clima?');

    if(temperatura < 25 && chuva === 'chovendo'){
        document.write('Vamos para outro destino')
    }
    else if(temperatura > 25 && chuva === 'ensolarado'){
        document.write('Vamos para para a praia bro!')
    }
    else{
        document.write('Não entendi qq ce falou analfabeta, escreve denovo')
    }




   </script> 
</body>
</html>
